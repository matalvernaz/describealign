name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Linux packages
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxcb-render-util0-dev \
            libxcb-keysyms1-dev \
            libxcb-shape0-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxkbcommon-x11-dev \
            libxcb-util-dev

      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -U pip wheel
          pip install -Ur requirements.txt
          pip install -Ur build-requirements.txt

      - name: Set build vars
        id: build-vars
        run: echo "version=$(cat version)" >> "$GITHUB_OUTPUT"

      - name: Build Executable
        run: |
          pyinstaller describealign.spec
        env:
          APP_VERSION: ${{ steps.build-vars.outputs.version }}

      - name: Build artifacts (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          pkgbuild \
            --install-location /Applications \
            --scripts Package/scripts \
            --component dist/describealign.app \
            /tmp/describealign-component.pkg
          productbuild \
            --package /tmp/describealign-component.pkg \
            --product Package/product.plist \
            --version '${{ steps.build-vars.outputs.version }}' \
            dist/describealign.pkg

      - name: Build artifacts (Linux)
        if: ${{ runner.os == 'Linux' }}
        working-directory: dist
        run: |
          tar cvzf describealign.tar.gz describealign

      - name: Build artifacts (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          directory: dist
          path: describealign
          filename: 'describealign.zip'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: |
            dist/*.pkg
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
